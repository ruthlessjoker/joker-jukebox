name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Replace Corrupt Wrapper
        run: |
          echo "Removing corrupt file..."
          rm -f gradle/wrapper/gradle-wrapper.jar
          echo "Downloading fresh wrapper JAR..."
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/v8.7.0/gradle/wrapper/gradle-wrapper.jar
          echo "Done!"

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: joker-jukebox-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
