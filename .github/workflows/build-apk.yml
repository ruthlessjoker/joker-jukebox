name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Fix Corrupt Gradle Wrapper
        run: |
          echo "Downloading fresh Gradle..."
          curl -L -o gradle.zip https://services.gradle.org/distributions/gradle-8.7-bin.zip
          unzip -q gradle.zip
          find . -name "gradle-wrapper.jar" -type f | head -1 | xargs -I {} cp {} gradle/wrapper/gradle-wrapper.jar
          rm -rf gradle.zip gradle-*
          echo "Wrapper replaced!"

      - name: Build APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: joker-jukebox-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
