name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
      
      - name: Download Gradle Wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -L https://services.gradle.org/distributions/gradle-8.7-bin.zip -o gradle.zip
          unzip -q gradle.zip
          cp gradle-8.7/gradle/wrapper/gradle-wrapper.jar gradle/wrapper/
          rm -rf gradle-8.7 gradle.zip
      
      - name: Create Gradlew Script
        run: |
          echo '#!/bin/sh' > gradlew
          echo 'exec java -classpath gradle/wrapper/gradle-wrapper.jar org.gradle.wrapper.GradleWrapperMain "$@"' >> gradlew
          chmod +x gradlew
      
      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon
      
      - uses: actions/upload-artifact@v4
        with:
          name: joker-jukebox-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
